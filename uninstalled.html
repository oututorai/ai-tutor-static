<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OU Tutor Uninstalled</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f8fafc;
      color: #0f172a;
      font-size: 14px;
      line-height: 1.7;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 16px;
    }
    .card {
      max-width: 480px;
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-radius: 1.5rem;
      border: 1px solid rgba(236,91,19,0.15);
      box-shadow: 0 4px 24px rgba(0,0,0,0.08), 0 1px 4px rgba(236,91,19,0.06);
      padding: 40px 32px;
      text-align: center;
    }
    .icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 56px;
      height: 56px;
      border-radius: 14px;
      background: rgba(236,91,19,0.10);
      color: #ec5b13;
      margin-bottom: 20px;
    }
    h1 {
      font-size: 18px;
      font-weight: 700;
      color: #0f172a;
      margin-bottom: 8px;
    }
    p {
      font-size: 14px;
      line-height: 1.7;
      color: #475569;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Sorry to see you go!</h1>
    <p>OU Tutor has been uninstalled. If you change your mind, you can always reinstall it from the Chrome Web Store.</p>
  </div>
</body>
</html>
